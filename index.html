<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追聖誕老公公之旅 🎅</title>
    <!-- 載入 Tailwind CSS (樣式框架) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 核心庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel (將 JSX 轉換為瀏覽器認得的 JS) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F7F4EB;
            color: #4A4543;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 載入 Firebase 模組 (CDN 版本) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 注意：這些變數是由本平台動態注入的。
        // 如果要在外部自行部署，請手動替換為您的 Firebase 配置物件。
        const firebaseConfig = {
  apiKey: "AIzaSyDMvp2DkeGq8pFPVyHaE8O5rjDjImMm52o",
  authDomain: "fairymoney-6357f.firebaseapp.com",
  projectId: "fairymoney-6357f",
  storageBucket: "fairymoney-6357f.firebasestorage.app",
  messagingSenderId: "724748246687",
  appId: "1:724748246687:web:a67c6dca3acc232505ccaa"
};
        const appId = window.__app_id || 'santa-trip-2026';

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 將 Firebase 工具掛載到 window，讓 Babel 內的 React 可以使用
        window.fb = { db, auth, appId, collection, doc, onSnapshot, addDoc, deleteDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <!-- React 應用程式代碼 -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const COLORS = {
            bg: '#F7F4EB', primary: '#9A8B9B', secondary: '#A8A196', accent: '#E0E5D5', text: '#4A4543', danger: '#D98E8E', success: '#8EB695'
        };

        const MEMBERS = ["仙姑", "欣倫", "貞霓", "羽喬"];
        const EXCHANGE_RATE = 35.5;

        const Icons = {
            Schedule: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            Luggage: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="7" width="18" height="14" rx="2"></rect><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path></svg>,
            Shopping: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path></svg>,
            Translate: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m5 8 6 6"></path><path d="m4 14 6-6 2-3"></path><path d="M2 5h12"></path></svg>,
            Wallet: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path></svg>,
            Phone: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
            Check: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path></svg>,
            CreditCard: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>,
            Banknote: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle></svg>,
            Refresh: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
        };

        const TRIP_DATA = [
            { date: '12/20', city: '赫爾辛基', temp: '1°/-2°', weather: '☁️', events: [{ time: '17:00', title: '百路達包車出發', note: '前往機場' }] },
            { date: '12/21', city: '赫爾辛基', temp: '0°/-3°', weather: '❄️', events: [{ time: '上午', title: '接機 ➔ 火車站', note: 'Trip.com $2800' }, { time: '景點', title: '市區一日遊', note: '教堂、聖誕市集' }] },
            { date: '12/22', city: '羅瓦涅米', temp: '-10°/-15°', weather: '❄️', events: [{ time: '早上', title: '聖誕麥當勞', note: '領極光證書' }, { time: '全天', title: '極地動物園', note: '€514' }] },
            { date: '12/23', city: '羅瓦涅米', temp: '-12°/-18°', weather: '🌫️', events: [{ time: '上午', title: '聖誕老人村', note: '郵局打卡' }, { time: '下午', title: '馴鹿雪橇', note: 'Santa Salmon' }] },
            { date: '12/24', city: '瑞典/凱米', temp: '-15°/-22°', weather: '❄️', events: [{ time: '全天', title: 'POLAR 破冰船', note: 'KKDAY $63324' }] },
            { date: '12/25', city: '薩里賽爾卡', temp: '-18°/-25°', weather: '❄️', events: [{ time: '上午', title: '哈士奇雪橇', note: '極限速度' }] },
            { date: '12/26', city: '伊瓦洛', temp: '-5°/-8°', weather: '🌤️', events: [{ time: '10:00', title: '冰釣摩托車', note: '4小時' }] },
            { date: '12/27', city: '赫爾辛基', temp: '2°/-1°', weather: '🌧️', events: [{ time: '下午', title: 'Lumene 採買', note: '送機 $2621' }] },
            { date: '12/28', city: '香港/澳門', temp: '18°', weather: '☀️', events: [{ time: '全天', title: '包車回家', note: '平安到家' }] }
        ];

        const LUGGAGE_GROUPS = [
            { cat: "穿著", items: ["極暖發熱衣x3", "羊毛襪x5", "防水雪靴", "防風外套", "發熱褲", "蓋耳毛帽", "觸控手套", "墨鏡"] },
            { cat: "科技/生活", items: ["行動電源x2", "歐規轉接頭", "相機腳架", "GoPro", "保濕乳液", "暖暖包x20"] }
        ];

        const getWeekday = (dateStr) => {
            const fullDate = dateStr.includes('-') ? dateStr : `2024-${dateStr.replace('/', '-')}`;
            const date = new Date(fullDate);
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            return isNaN(date.getTime()) ? '' : weekdays[date.getDay()];
        };

        const getCountdown = () => {
            const target = new Date('2026-12-20T00:00:00');
            const now = new Date();
            const diff = target.getTime() - now.getTime();
            return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-[1.5rem] p-4 border-b-2 border-r-2 border-[#E0E5D5] shadow-sm ${className}`}>
                {children}
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('schedule');
            const [selectedDate, setSelectedDate] = useState('12/21');
            const [user, setUser] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [countdown, setCountdown] = useState(getCountdown());
            const [newExp, setNewExp] = useState({ date: new Date().toISOString().split('T')[0], title: '', amount: '', currency: 'EUR', payer: '仙姑', split: [...MEMBERS], method: 'card' });

            useEffect(() => {
                if (!window.fb) return;
                const { auth, db, appId, signInAnonymously, onAuthStateChanged, onSnapshot, collection } = window.fb;
                signInAnonymously(auth).catch(console.error);
                const unsubAuth = onAuthStateChanged(auth, setUser);
                
                let unsubExp = () => {};
                const checkUser = setInterval(() => {
                    if (auth.currentUser) {
                        const q = collection(db, 'artifacts', appId, 'public', 'data', 'expenses');
                        unsubExp = onSnapshot(q, (s) => setExpenses(s.docs.map(d => ({id: d.id, ...d.data()}))));
                        clearInterval(checkUser);
                    }
                }, 500);

                return () => { unsubAuth(); unsubExp(); clearInterval(checkUser); };
            }, []);

            const { settlement, totalTwd } = useMemo(() => {
                const bal = {}; MEMBERS.forEach(m => bal[m] = 0);
                let total = 0;
                expenses.forEach(e => {
                    const val = e.currency === 'EUR' ? e.amount * EXCHANGE_RATE : e.amount;
                    total += val;
                    bal[e.payer] += val;
                    const share = val / (e.split?.length || 1);
                    (e.split || MEMBERS).forEach(m => bal[m] -= share);
                });
                return { settlement: bal, totalTwd: total };
            }, [expenses]);

            return (
                <div className="min-h-screen pb-24 text-[13px]">
                    <header className="sticky top-0 z-50 bg-[#F7F4EB]/90 backdrop-blur-md px-5 py-3 border-b border-[#E0E5D5] shadow-sm">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-xl font-black tracking-tighter text-[#4A4543]">追聖誕老公公之旅 🎅</h1>
                                <div className="mt-1 text-[10px] font-bold text-[#9A8B9B]">駐芬代表處: +358 40 545 5429</div>
                            </div>
                            <div className="text-right flex flex-col items-end pr-4">
                                <div className="flex flex-col items-center">
                                    <div className="bg-[#9A8B9B] text-white px-3 py-1 rounded-2xl shadow-sm border-b-2 border-r-2 border-black/10">
                                        <span className="text-[8px] font-black opacity-80 uppercase block mb-1">Departure</span>
                                        <div className="flex items-baseline gap-1">
                                            <span className="text-lg font-black">{countdown}</span>
                                            <span className="text-[9px] font-bold">DAYS</span>
                                        </div>
                                    </div>
                                    <div className="text-[8px] font-bold text-[#9A8B9B] mt-1 uppercase">Target: 2026/12/20</div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4">
                        {activeTab === 'schedule' && (
                            <div className="space-y-5">
                                <div className="flex gap-3 overflow-x-auto no-scrollbar py-2">
                                    {TRIP_DATA.map(d => (
                                        <button key={d.date} onClick={() => setSelectedDate(d.date)}
                                            className={`flex-shrink-0 w-[70px] h-[82px] rounded-2xl flex flex-col items-center justify-center border-2 transition-all ${selectedDate === d.date ? 'bg-[#9A8B9B] border-[#9A8B9B] text-white shadow-lg' : 'bg-white border-[#E0E5D5]'}`}>
                                            <span className="text-[9px] font-black opacity-60 uppercase mb-0.5">Dec</span>
                                            <span className="text-xl font-black">{d.date.split('/')[1]}</span>
                                            <span className="text-[10px] font-bold opacity-90 mt-1.5 border-t border-current/20 pt-1 w-10 text-center">週{getWeekday(d.date)}</span>
                                        </button>
                                    ))}
                                </div>
                                {TRIP_DATA.filter(d => d.date === selectedDate).map(day => (
                                    <div key={day.date} className="space-y-4">
                                        <div className="flex justify-between items-center px-1">
                                            <div className="text-xl font-black">{day.city}</div>
                                            <div className="text-[10px] font-black text-[#9A8B9B] bg-white px-3 py-1.5 rounded-full border border-[#E0E5D5] shadow-sm">
                                                {day.temp} {day.weather}
                                            </div>
                                        </div>
                                        <div className="space-y-3 pl-6 border-l-2 border-[#E0E5D5] ml-2">
                                            {day.events.map((e, i) => (
                                                <Card key={i}>
                                                    <span className="text-[9px] font-black text-[#9A8B9B] px-1.5 py-0.5 bg-[#9A8B9B]/10 rounded-full uppercase">{e.time}</span>
                                                    <h3 className="font-bold text-[#4A4543] mt-1">{e.title}</h3>
                                                    <p className="text-[11px] text-[#A8A196] mt-0.5">{e.note}</p>
                                                </Card>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'expense' && (
                            <div className="space-y-5">
                                <Card className="bg-[#4A4543] text-white shadow-xl">
                                    <div className="text-[10px] font-black opacity-40 uppercase border-b border-white/10 pb-2 mb-4">結算狀況 (NTD)</div>
                                    <div className="space-y-3">
                                        {MEMBERS.map(m => (
                                            <div key={m} className="flex justify-between items-center">
                                                <span className="font-bold">{m}</span>
                                                <span className={`font-black ${settlement[m] >= 0 ? 'text-[#8EB695]' : 'text-[#D98E8E]'}`}>
                                                    {settlement[m] >= 0 ? `+ $${Math.round(settlement[m]).toLocaleString()}` : `- $${Math.abs(Math.round(settlement[m])).toLocaleString()}`}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                                {/* 此處可繼續加入新增支出的表單與列表 */}
                                <div className="text-center p-10 text-gray-400">記帳功能與雲端同步中... ❄️</div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-5 right-5 z-50">
                        <div className="max-w-[420px] mx-auto bg-white/95 backdrop-blur-xl rounded-[2.5rem] p-2 flex items-center justify-around shadow-2xl border border-white/50">
                            {[
                                { id: 'schedule', icon: Icons.Schedule, label: '行程' },
                                { id: 'luggage', icon: Icons.Luggage, label: '行李' },
                                { id: 'shopping', icon: Icons.Shopping, label: '必買' },
                                { id: 'translate', icon: Icons.Translate, label: '翻譯' },
                                { id: 'expense', icon: Icons.Wallet, label: '分帳' },
                            ].map(({ id, icon: Icon, label }) => (
                                <button key={id} onClick={() => setActiveTab(id)} className={`flex flex-col items-center justify-center w-11 h-11 transition-all rounded-2xl ${activeTab === id ? 'text-[#9A8B9B] bg-[#9A8B9B]/10' : 'text-gray-300'}`}>
                                    <Icon />
                                    {activeTab === id && <span className="text-[9px] font-black uppercase mt-0.5">{label}</span>}
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
